<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MB Flores — Exportar Pedidos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap');
    :root {
      --green:#1e3d2b;--green-mid:#2e6644;--green-light:#4a9464;
      --gold:#b8975a;--cream:#f7f4ee;--white:#ffffff;
      --dark:#111714;--gray:#6b7a72;--border:#ddd8cc;--red:#a83226;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Jost',sans-serif;background:var(--cream);min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:1.5rem}
    body::before{content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 60% 50% at 10% 20%,rgba(74,148,100,0.07) 0%,transparent 70%),
                 radial-gradient(ellipse 50% 60% at 90% 80%,rgba(184,151,90,0.06) 0%,transparent 70%);
      pointer-events:none}
    .card{background:var(--white);border:1px solid var(--border);border-radius:20px;
      padding:3rem 2.75rem 2.5rem;max-width:420px;width:100%;
      box-shadow:0 8px 48px rgba(30,61,43,0.13);position:relative;
      animation:fadeUp 0.5s ease both;text-align:center}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:3px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 3px 3px}
    .brand-name{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:600;
      color:var(--green);letter-spacing:0.04em;line-height:1}
    .brand-name em{color:var(--gold);font-style:normal}
    .brand-sub{font-size:0.7rem;letter-spacing:0.22em;text-transform:uppercase;
      color:var(--gray);margin-top:0.4rem;margin-bottom:2rem}
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);
      margin:0 -0.5rem 2rem}
    .desc{font-size:0.9rem;color:var(--gray);margin-bottom:2rem;line-height:1.6}
    .btn{width:100%;padding:1.1rem;
      background:linear-gradient(135deg,var(--green) 0%,var(--green-mid) 100%);
      color:var(--white);border:none;border-radius:10px;font-family:'Jost',sans-serif;
      font-size:1rem;font-weight:500;letter-spacing:0.05em;cursor:pointer;
      transition:opacity 0.2s,transform 0.1s,box-shadow 0.2s;
      display:flex;align-items:center;justify-content:center;gap:0.6rem;
      box-shadow:0 4px 16px rgba(30,61,43,0.25)}
    .btn:hover:not(:disabled){opacity:0.92;box-shadow:0 6px 22px rgba(30,61,43,0.32)}
    .btn:active:not(:disabled){transform:scale(0.98)}
    .btn:disabled{opacity:0.55;cursor:not-allowed}
    .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.35);
      border-top-color:white;border-radius:50%;animation:spin 0.75s linear infinite;
      display:none;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .steps{margin-top:1.5rem;display:none;flex-direction:column;gap:0.5rem;text-align:left}
    .steps.show{display:flex}
    .step{display:flex;align-items:center;gap:0.75rem;font-size:0.83rem;color:var(--gray);transition:color 0.3s}
    .step.active{color:var(--green)}.step.done{color:var(--green-light)}
    .step-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-size:0.7rem;
      flex-shrink:0;transition:all 0.3s;color:var(--gray)}
    .step.active .step-dot{border-color:var(--green-light);background:rgba(74,148,100,0.1);color:var(--green)}
    .step.done .step-dot{border-color:var(--green-light);background:var(--green-light);color:white}
    .progress{margin-top:1rem;height:3px;background:var(--border);border-radius:2px;overflow:hidden;display:none}
    .progress.show{display:block}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--green-light),var(--gold));
      border-radius:2px;transition:width 0.5s ease;width:0%}
    .toast{margin-top:1.25rem;padding:1rem 1.1rem;border-radius:10px;font-size:0.875rem;
      line-height:1.6;display:none;text-align:left}
    .toast.show{display:block}
    .toast.success{background:#edf5f0;color:#155c2f;border:1px solid #6dbf8e}
    .toast.error{background:#fdf0ee;color:var(--red);border:1px solid #f0b0a8}
  </style>
</head>
<body>
<div class="card">
  <div class="brand-name">MB <em>Flores</em></div>
  <div class="brand-sub">Exportação de Pedidos</div>
  <div class="divider"></div>
  <p class="desc">Clique no botão abaixo para gerar e baixar a planilha completa de pedidos.</p>

  <button class="btn" id="btn" onclick="exportar()">
    <span id="btnIcon">📊</span>
    <span id="btnText">Baixar Planilha de Pedidos</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="progress" id="progress">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="steps" id="steps">
    <div class="step" id="step1"><div class="step-dot" id="dot1">1</div><span>Buscando pedidos no Airtable...</span></div>
    <div class="step" id="step2"><div class="step-dot" id="dot2">2</div><span>Gerando planilha Excel...</span></div>
    <div class="step" id="step3"><div class="step-dot" id="dot3">3</div><span>Baixando arquivo...</span></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  const AIRTABLE_TOKEN = 'patOgfVPRLsnmQdAo.ad07e86b410af65b6049d0086f53547ff041f713d96517d303b93032336ecd45';
  const BASE_ID        = 'appE7Y2kABDmDgYYn';
  const TABLE_ID       = 'tblsEqDfZrsOeI3H0';

  // Mapeamento: nome da coluna no Excel → campo real no Airtable
  const MAPA_COLUNAS = [
    { label: 'Número do Pedido',             campo: 'Número do Pedido',                      tipo: 'texto' },
    { label: 'Nome do Cliente',              campo: 'Nome do Cliente',                        tipo: 'texto' },
    { label: 'Data do Pedido',               campo: 'Data do Pedido',                         tipo: 'data' },
    { label: 'CPF/CNPJ',                     campo: 'CPF/CNPJ (from Clientes)',               tipo: 'lookup' },
    { label: 'Telefone',                     campo: 'Telefone',                               tipo: 'texto' },
    { label: 'E-mail',                       campo: 'E-mail',                                 tipo: 'texto' },
    { label: 'Nome do Falecido',             campo: 'Nome do Falecido',                       tipo: 'texto' },
    { label: 'Data de Sepultamento',         campo: 'Data de Sepultamento',                   tipo: 'data' },
    { label: 'Produto 1',                    campo: 'Descrição (from Produto 1)',              tipo: 'lookup' },
    { label: 'Quantidade 1',                 campo: 'Quantidade 1',                           tipo: 'texto' },
    { label: 'Desconto 1 (R$)',              campo: 'Desconto 1 (R$)',                        tipo: 'moeda' },
    { label: 'Valor Total Item 1 (R$)',      campo: 'Valor Total Item 1 (R$) (Manual)',       tipo: 'moeda' },
    { label: 'Mensagem 1',                   campo: 'Mensagem 1',                             tipo: 'texto' },
    { label: 'Produto 2',                    campo: 'Descrição (from Produto 2)',              tipo: 'lookup' },
    { label: 'Quantidade 2',                 campo: 'Quantidade 2',                           tipo: 'texto' },
    { label: 'Desconto 2 (R$)',              campo: 'Desconto 2 (R$)',                        tipo: 'moeda' },
    { label: 'Valor Total Item 2 (R$)',      campo: 'Valor Total Item 2 (R$) (Manual)',       tipo: 'moeda' },
    { label: 'Mensagem 2',                   campo: 'Mensagem 2',                             tipo: 'texto' },
    { label: 'Produto 3',                    campo: 'Descrição (from Produto 3)',              tipo: 'lookup' },
    { label: 'Quantidade 3',                 campo: 'Quantidade 3',                           tipo: 'texto' },
    { label: 'Desconto 3 (R$)',              campo: 'Desconto 3 (R$)',                        tipo: 'moeda' },
    { label: 'Valor Total Item 3 (R$)',      campo: 'Valor Total Item 3 (R$) (Manual)',       tipo: 'moeda' },
    { label: 'Mensagem 3',                   campo: 'Mensagem 3',                             tipo: 'texto' },
    { label: 'Produto 4',                    campo: 'Descrição (from Produto 4)',              tipo: 'lookup' },
    { label: 'Quantidade 4',                 campo: 'Quantidade 4',                           tipo: 'texto' },
    { label: 'Desconto 4 (R$)',              campo: 'Desconto 4 (R$)',                        tipo: 'moeda' },
    { label: 'Valor Total Item 4 (R$)',      campo: 'Valor Total Item 4 (R$) (Manual)',       tipo: 'moeda' },
    { label: 'Mensagem 4',                   campo: 'Mensagem 4',                             tipo: 'texto' },
    { label: 'Produto 5',                    campo: 'Descrição (from Produto 5)',              tipo: 'lookup' },
    { label: 'Quantidade 5',                 campo: 'Quantidade 5',                           tipo: 'texto' },
    { label: 'Desconto 5 (R$)',              campo: 'Desconto 5 (R$)',                        tipo: 'moeda' },
    { label: 'Valor Total Item 5 (R$)',      campo: 'Valor Total Item 5 (R$) (Manual)',       tipo: 'moeda' },
    { label: 'Mensagem 5',                   campo: 'Mensagem 5',                             tipo: 'texto' },
    { label: 'Total do Pedido (R$)',         campo: 'Total do Pedido (R$) (Manual)',          tipo: 'moeda' },
    { label: 'Forma de Pagamento',           campo: 'Forma de Pagamento',                     tipo: 'texto' },
    { label: 'Pedido Pago?',                 campo: 'Pedido Pago?',                           tipo: 'texto' },
    { label: 'Formato do Comprovante',       campo: 'Formato do Comprovante',                 tipo: 'texto' },
    { label: 'Urgência do Pedido',           campo: 'Urgência do Pedido',                     tipo: 'texto' },
    { label: 'Data e Hora de Entrega',       campo: 'Data e Hora de Entrega',                 tipo: 'datahora' },
    { label: 'Endereço de Entrega',          campo: 'Endereço de Entrega',                    tipo: 'texto' },
    { label: 'Sala / Complemento',           campo: 'Sala / Complemento',                     tipo: 'texto' },
    { label: 'Observações',                  campo: 'Observações Gerais do Pedido',           tipo: 'texto' },
    { label: 'Status do Pedido',             campo: 'Status do Pedido',                       tipo: 'texto' },
    { label: 'Motivo do Cancelamento',       campo: 'Motivo do Cancelamento',                 tipo: 'texto' },
    { label: 'Total de Produtos',            campo: 'Total de Produtos',                      tipo: 'texto' },
  ];

  // Formato moeda BR
  const FMT_MOEDA = 'R$ #,##0.00';
  const FMT_DATA  = 'DD/MM/YYYY';
  const FMT_DATAHORA = 'DD/MM/YYYY HH:MM';

  function setLoading(on) {
    document.getElementById('btn').disabled = on;
    document.getElementById('btnIcon').style.display = on ? 'none' : 'inline';
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btnText').textContent = on ? 'Processando...' : 'Baixar Planilha de Pedidos';
  }
  function setProgress(pct) {
    document.getElementById('progress').classList.add('show');
    document.getElementById('progressFill').style.width = pct + '%';
  }
  function activateStep(n) {
    for (let i = 1; i <= 3; i++) {
      const s = document.getElementById(`step${i}`);
      const d = document.getElementById(`dot${i}`);
      s.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
      d.textContent = i < n ? '✓' : i;
    }
  }
  function showToast(html, type) {
    const el = document.getElementById('toast');
    el.innerHTML = html;
    el.className = `toast show ${type}`;
  }

  // Extrai valor do campo — lookup retorna só o primeiro
  function getValor(record, campo, tipo) {
    const v = record.fields[campo];
    if (v === undefined || v === null) return tipo === 'moeda' ? 0 : '';

    // Lookup / linked record array → pega só o primeiro
    if (Array.isArray(v)) {
      const f = v[0];
      if (f === undefined || f === null) return tipo === 'moeda' ? 0 : '';
      if (typeof f === 'object') return f.name || f.text || f.value || f.id || '';
      return String(f);
    }

    if (typeof v === 'object') return v.name || v.email || v.text || '';

    // Moeda: converte string "R$ 1.234,56" → número
    if (tipo === 'moeda') {
      const n = parseFloat(String(v).replace(/[R$\s.]/g,'').replace(',','.'));
      return isNaN(n) ? 0 : n;
    }

    return v;
  }

  // Converte string de data para objeto Date
  function parseData(str) {
    if (!str) return null;
    let d = new Date(str);
    if (!isNaN(d.getTime())) return d;
    const p = String(str).split('/');
    if (p.length === 3) { d = new Date(p[2], p[1]-1, p[0]); }
    return isNaN(d.getTime()) ? null : d;
  }

  // Converte Date para número serial do Excel
  function dateToExcel(d) {
    if (!d) return '';
    const epoch = new Date(1899, 11, 30);
    return (d - epoch) / 86400000;
  }

  async function exportar() {
    setLoading(true);
    document.getElementById('steps').className = 'steps show';
    setProgress(5);
    activateStep(1);

    const allRecords = [];
    let offset = null;
    let page = 0;

    try {
      // ETAPA 1 — Buscar registros
      do {
        page++;
        let url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?pageSize=100`;
        if (offset) url += `&offset=${encodeURIComponent(offset)}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `Erro HTTP ${res.status}`);
        }
        const data = await res.json();
        allRecords.push(...data.records);
        offset = data.offset || null;
        setProgress(Math.min(5 + page * 10, 50));
      } while (offset);

      // ETAPA 2 — Gerar Excel
      activateStep(2);
      setProgress(65);

      const headers = MAPA_COLUNAS.map(c => c.label);
      const ws = {};
      const range = { s:{r:0,c:0}, e:{r:allRecords.length, c:headers.length-1} };

      // Cabeçalho com estilo verde
      headers.forEach((h, c) => {
        ws[XLSX.utils.encode_cell({r:0,c})] = {
          v: h, t: 's',
          s: { font:{bold:true,color:{rgb:'FFFFFF'},sz:10},
               fill:{fgColor:{rgb:'1e3d2b'}},
               alignment:{horizontal:'center',vertical:'center'} }
        };
      });

      // Dados
      allRecords.forEach((record, ri) => {
        MAPA_COLUNAS.forEach(({ campo, tipo }, c) => {
          const val = getValor(record, campo, tipo);
          const cellRef = XLSX.utils.encode_cell({r: ri+1, c});

          if (tipo === 'moeda') {
            ws[cellRef] = { v: val, t: 'n', s: { numFmt: FMT_MOEDA } };
          } else if (tipo === 'data') {
            const d = parseData(val);
            if (d) {
              const dd = String(d.getDate()).padStart(2,'0');
              const mm = String(d.getMonth()+1).padStart(2,'0');
              const yy = d.getFullYear();
              ws[cellRef] = { v: `${dd}/${mm}/${yy}`, t: 's' };
            } else {
              ws[cellRef] = { v: val || '', t: 's' };
            }
          } else if (tipo === 'datahora') {
            const raw = String(val || '');
            if (raw) {
              // Airtable retorna ISO: 2026-04-01T14:30:00.000Z
              const d = new Date(raw);
              if (!isNaN(d.getTime())) {
                const dd  = String(d.getDate()).padStart(2,'0');
                const mm  = String(d.getMonth()+1).padStart(2,'0');
                const yy  = d.getFullYear();
                const hh  = String(d.getHours()).padStart(2,'0');
                const min = String(d.getMinutes()).padStart(2,'0');
                ws[cellRef] = { v: `${dd}/${mm}/${yy} ${hh}:${min}`, t: 's' };
              } else {
                ws[cellRef] = { v: raw, t: 's' };
              }
            } else {
              ws[cellRef] = { v: '', t: 's' };
            }
          } else {
            ws[cellRef] = { v: String(val || ''), t: 's' };
          }
        });
      });

      ws['!ref'] = XLSX.utils.encode_range(range);
      ws['!cols'] = MAPA_COLUNAS.map(c => ({ wch: Math.max(c.label.length + 2, 16) }));
      ws['!rows'] = [{ hpt: 20 }];
      ws['!freeze'] = { xSplit: 0, ySplit: 1 };

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Pedidos');

      // ETAPA 3 — Download
      activateStep(3);
      setProgress(90);

      const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
      const filename = `MB_Flores_Pedidos_${hoje}.xlsx`;
      XLSX.writeFile(wb, filename);

      setProgress(100);
      setLoading(false);
      showToast(
        `✅ <strong>Download concluído!</strong><br>
         Arquivo <strong>${filename}</strong> com <strong>${allRecords.length} pedidos</strong>.`,
        'success'
      );

    } catch (err) {
      setLoading(false);
      showToast(`❌ ${err.message}`, 'error');
      console.error(err);
    }
  }
</script>
</body>
</html>
